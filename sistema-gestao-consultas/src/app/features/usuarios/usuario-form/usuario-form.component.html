<h2 mat-dialog-title>{{ editando ? 'Editar Usuário' : 'Novo Usuário' }}</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="form">

    <mat-form-field appearance="fill" class="campo-completo">
      <mat-label>Nome</mat-label>
      <input matInput formControlName="nome" />
      <mat-error *ngIf="form.get('nome')?.hasError('required')">
        Nome é obrigatório
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="fill" class="campo-completo">
      <mat-label>E-mail</mat-label>
      <input matInput formControlName="email" type="email" />
      <mat-error *ngIf="form.get('email')?.hasError('required')">
        E-mail é obrigatório
      </mat-error>
      <mat-error *ngIf="form.get('email')?.hasError('email')">
        E-mail inválido
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="fill" class="campo-completo">
      <mat-label>CPF</mat-label>
      <input matInput formControlName="cpf" />
      <mat-error *ngIf="form.get('cpf')?.hasError('required')">
        CPF é obrigatório
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="fill" class="campo-completo">
      <mat-label>Perfil</mat-label>
      <mat-select formControlName="perfil">
        <mat-option *ngFor="let p of perfis" [value]="p">
          {{ p }}
        </mat-option>
      </mat-select>
      <mat-error *ngIf="form.get('perfil')?.hasError('required')">
        Perfil é obrigatório
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="fill" class="campo-completo">
      <mat-label>{{ editando ? 'Nova Senha (deixe em branco para manter)' : 'Senha' }}</mat-label>
      <input matInput formControlName="senha" [type]="senhaVisivel ? 'text' : 'password'" />
      <button mat-icon-button matSuffix type="button" (click)="senhaVisivel = !senhaVisivel">
        <mat-icon>{{ senhaVisivel ? 'visibility_off' : 'visibility' }}</mat-icon>
      </button>
      <mat-error *ngIf="form.get('senha')?.hasError('required')">
        Senha é obrigatória
      </mat-error>
    </mat-form-field>

    <p class="texto-erro" *ngIf="erro">{{ erro }}</p>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancelar()">Cancelar</button>
  <button
    mat-flat-button
    (click)="salvar()"
    [disabled]="carregando"
    class="botao-salvar">
    {{ carregando ? 'Salvando...' : 'Salvar' }}
  </button>
</mat-dialog-actions>
