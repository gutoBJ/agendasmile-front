<div class="consultas">
  <div class="topo">
    <h2>Consultas</h2>
    <button mat-flat-button class="botao-novo" (click)="novo()">
      <mat-icon>add</mat-icon>
      Nova Consulta
    </button>
  </div>

  <p class="texto-erro" *ngIf="erro">{{ erro }}</p>
  <p class="texto-leve" *ngIf="carregando">Carregando...</p>

  <mat-card *ngIf="!carregando">
    <mat-card-content>
      <table mat-table [dataSource]="consultas" class="tabela">

        <ng-container matColumnDef="paciente">
          <th mat-header-cell *matHeaderCellDef>Paciente</th>
          <td mat-cell *matCellDef="let c">{{ c.nomePaciente }}</td>
        </ng-container>

        <ng-container matColumnDef="dentista">
          <th mat-header-cell *matHeaderCellDef>Dentista</th>
          <td mat-cell *matCellDef="let c">{{ c.nomeDentista }}</td>
        </ng-container>

        <ng-container matColumnDef="dataInicio">
          <th mat-header-cell *matHeaderCellDef>Início</th>
          <td mat-cell *matCellDef="let c">{{ c.dataInicio | date:'dd/MM/yyyy HH:mm' }}</td>
        </ng-container>

        <ng-container matColumnDef="dataFim">
          <th mat-header-cell *matHeaderCellDef>Fim</th>
          <td mat-cell *matCellDef="let c">{{ c.dataFim | date:'dd/MM/yyyy HH:mm' }}</td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let c">
            <mat-chip [class]="getStatusClass(c.status)">
              {{ c.status }}
            </mat-chip>
          </td>
        </ng-container>

        <ng-container matColumnDef="acoes">
          <th mat-header-cell *matHeaderCellDef>Ações</th>
          <td mat-cell *matCellDef="let c">
            <button
              mat-icon-button
              (click)="editar(c)"
              [disabled]="c.status !== 'AGENDADA'">
              <mat-icon>edit</mat-icon>
            </button>
            <button
              mat-icon-button
              color="warn"
              (click)="cancelar(c.id)"
              [disabled]="c.status !== 'AGENDADA'">
              <mat-icon>cancel</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="colunas"></tr>
        <tr mat-row *matRowDef="let row; columns: colunas;"></tr>

      </table>

      <p class="texto-leve sem-dados" *ngIf="consultas.length === 0">
        Nenhuma consulta cadastrada.
      </p>
    </mat-card-content>
  </mat-card>
</div>
