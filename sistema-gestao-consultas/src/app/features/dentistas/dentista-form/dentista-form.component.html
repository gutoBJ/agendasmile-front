<h2 mat-dialog-title>{{ editando ? 'Editar Dentista' : 'Novo Dentista' }}</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="form">

    <mat-form-field appearance="fill" class="campo-completo">
      <mat-label>Nome</mat-label>
      <input matInput formControlName="nome" />
      <mat-error *ngIf="form.get('nome')?.hasError('required')">
        Nome é obrigatório
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="fill" class="campo-completo">
      <mat-label>E-mail</mat-label>
      <input matInput formControlName="email" type="email" />
      <mat-error *ngIf="form.get('email')?.hasError('required')">
        E-mail é obrigatório
      </mat-error>
      <mat-error *ngIf="form.get('email')?.hasError('email')">
        E-mail inválido
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="fill" class="campo-completo">
      <mat-label>CPF</mat-label>
      <input matInput formControlName="cpf" />
      <mat-error *ngIf="form.get('cpf')?.hasError('required')">
        CPF é obrigatório
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="fill" class="campo-completo">
      <mat-label>CRO</mat-label>
      <input matInput formControlName="cro" />
      <mat-error *ngIf="form.get('cro')?.hasError('required')">
        CRO é obrigatório
      </mat-error>
    </mat-form-field>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancelar()">Cancelar</button>
  <button
    mat-flat-button
    (click)="salvar()"
    [disabled]="carregando"
    class="botao-salvar">
    {{ carregando ? 'Salvando...' : 'Salvar' }}
  </button>
</mat-dialog-actions>
