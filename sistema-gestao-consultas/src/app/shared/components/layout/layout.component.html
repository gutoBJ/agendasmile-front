<mat-sidenav-container class="container">

  <mat-sidenav
    #drawer
    class="sidenav"
    [mode]="mobile ? 'over' : 'side'"
    [opened]="!mobile">

    <app-sidebar />

  </mat-sidenav>

  <mat-sidenav-content>

    <app-header
      [drawer]="drawer"
      [mobile]="mobile">
    </app-header>

    <main class="conteudo">
      <router-outlet />
    </main>

    <app-footer />

  </mat-sidenav-content>

</mat-sidenav-container>
