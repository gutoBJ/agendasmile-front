<div class="boas-vindas">
  <div class="icone">
    <mat-icon>sentiment_very_satisfied</mat-icon>
  </div>

  <h2 mat-dialog-title>Bem-vindo, {{ data.nome }}!</h2>

  <mat-dialog-content>
    <p class="texto-leve">
      Você está logado como <strong>{{ data.perfil }}</strong>.
      Bom trabalho!
    </p>
  </mat-dialog-content>

  <mat-dialog-actions align="center">
    <button mat-flat-button class="botao-entrar" (click)="fechar()">
      Começar
    </button>
  </mat-dialog-actions>
</div>
